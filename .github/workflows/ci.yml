name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Set up dependencies
        run: uv sync --all-extras --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest
      - name: Foundry validation
        run: uv run python scripts/validate_foundry.py
      - name: Pack validation
        run: uv run python scripts/validate_pack.py
      - name: Tool plan smoke test
        run: uv run python tool_fabric/resolvers/resolve_tool_plan.py --project-type empirical_materials --task "test domain shift and local calibration" --stage experiment --target-output "reproducible result and figure" --profiles concrete_ml,advanced_figure
