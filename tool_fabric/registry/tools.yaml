schema_version: "1.0"
purpose: "Canonical Research Foundry tool registry."

controlled_vocabularies:
  status:
    - not_installed
    - optional
    - installed
    - experimental
    - deprecated
    - blocked
  role:
    - primary
    - secondary
    - conditional
    - fallback
    - audit_only
  source_type:
    - local_python
    - mcp
    - external_skill
    - cli
    - library
    - manual_tool
    - cloud_service

defaults:
  permissions: &default_permissions
    network_access: optional
    filesystem_write_scope: declared_artifacts_only
    data_sensitivity: no_private_or_restricted_data_without_project_approval
    code_execution: false
  downstream_export_policy: &default_export
    exportable: true
    export_mode: manifest_reference
    protected_paths:
      - AGENTS.md
      - 08_tools/TOOLFLOW.md
  risk_notes: &default_risks
    hallucination_risk: medium
    provenance_risk: medium
    reproducibility_risk: medium
    supply_chain_risk: medium
  local_scope: &local_scope
    - foundry
    - research_os
  all_project_types: &all_project_types
    - empirical_materials
    - ai_industry
    - industrial_factor
    - investment_due_diligence
    - ai_method_paper

tools:
  paper_search_mcp:
    tool_id: paper_search_mcp
    display_name: "Paper Search MCP"
    category: F01_discovery_external_evidence
    sub_category: academic_metadata_discovery
    role: primary
    status: optional
    source_type: mcp
    source_repository: "MCP-compatible paper search service"
    source_url: "https://modelcontextprotocol.io/"
    license: service_specific
    version_pin: ""
    installation_mode: explicit_user_config
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - academic literature and metadata discovery
      - candidate paper retrieval
    activation_triggers:
      - task mentions literature discovery or external paper lookup
      - local Zotero library is insufficient
    inputs:
      - query
      - domain constraints
      - date range
    outputs:
      - paper metadata
      - source candidates
    artifact_contracts:
      - source registry entry
      - evidence matrix row
    permissions:
      <<: *default_permissions
      network_access: required
    dependencies:
      python_packages: []
      system_packages: []
      external_services:
        - paper_search_mcp_server
      credentials_required: []
    overlap_group: literature_discovery
    default_priority: 20
    fallback_tools:
      - openalex_adapter
      - crossref_adapter
      - semantic_scholar_adapter
    conflicts_with: []
    compatibility_notes:
      - Use for discovery only; never finalize a research claim.
    risk_notes: *default_risks
    human_review_required_when:
      - selected sources support reportable claims
      - search results are contradictory or low confidence
    downstream_export_policy: *default_export

  tavily_mcp:
    tool_id: tavily_mcp
    display_name: "Tavily MCP"
    category: F01_discovery_external_evidence
    sub_category: web_industry_evidence
    role: primary
    status: optional
    source_type: mcp
    source_repository: "Tavily MCP"
    source_url: "https://github.com/tavily-ai/tavily-mcp"
    license: service_specific
    version_pin: ""
    installation_mode: explicit_user_config
    default_scope:
      - foundry
      - research_os
      - industry_program
    allowed_project_types:
      - ai_industry
      - industrial_factor
      - investment_due_diligence
      - ai_method_paper
    primary_tasks:
      - industry evidence discovery
      - company and policy source lookup
      - current web evidence retrieval
    activation_triggers:
      - task needs current company, market, policy, release, or web evidence
      - source date and as-of date are required
    inputs:
      - query
      - source priority
      - time window
    outputs:
      - source candidates with URLs
      - evidence notes
    artifact_contracts:
      - source registry entry with event_date, disclosure_date, and as_of_date
      - event ledger row
    permissions:
      <<: *default_permissions
      network_access: required
    dependencies:
      python_packages: []
      system_packages: []
      external_services:
        - tavily
      credentials_required:
        - TAVILY_API_KEY
    overlap_group: web_discovery
    default_priority: 20
    fallback_tools:
      - official_source_verifier
    conflicts_with: []
    compatibility_notes:
      - Prefer official and primary sources before news or commentary.
    risk_notes:
      hallucination_risk: medium
      provenance_risk: high
      reproducibility_risk: medium
      supply_chain_risk: medium
    human_review_required_when:
      - source will support investment, strategy, or company claims
      - source is not official or primary
    downstream_export_policy: *default_export

  zotero:
    tool_id: zotero
    display_name: Zotero
    category: F01_discovery_external_evidence
    sub_category: literature_asset_storage
    role: primary
    status: optional
    source_type: manual_tool
    source_repository: zotero/zotero
    source_url: "https://github.com/zotero/zotero"
    license: AGPL-3.0
    version_pin: ""
    installation_mode: user_desktop_install
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - reference library management
      - source asset storage
      - tags and notes
    activation_triggers:
      - project maintains reusable citation library
      - literature evidence must be organized outside Git
    inputs:
      - DOI
      - PDF
      - URL
      - bibliographic metadata
    outputs:
      - citation records
      - notes
      - bibliography exports
    artifact_contracts:
      - source registry entry
      - exported bibliography when needed
    permissions:
      <<: *default_permissions
      filesystem_write_scope: user_library_outside_repo
    dependencies:
      python_packages: []
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: reference_management
    default_priority: 10
    fallback_tools:
      - zotero_mcp
      - zotero_notes
    conflicts_with: []
    compatibility_notes:
      - Do not commit local Zotero databases or restricted PDFs.
    risk_notes:
      hallucination_risk: low
      provenance_risk: low
      reproducibility_risk: medium
      supply_chain_risk: low
    human_review_required_when:
      - restricted PDFs or licensed content are involved
    downstream_export_policy: *default_export

  zotero_mcp:
    tool_id: zotero_mcp
    display_name: "Zotero MCP"
    category: F01_discovery_external_evidence
    sub_category: local_library_access
    role: secondary
    status: optional
    source_type: mcp
    source_repository: zotero_mcp_compatible_server
    source_url: "https://modelcontextprotocol.io/"
    license: server_specific
    version_pin: ""
    installation_mode: explicit_user_config
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - query local Zotero library
      - retrieve citation metadata
    activation_triggers:
      - task references local library search
      - Zotero is already maintained by the project
    inputs:
      - library query
      - collection or tag
    outputs:
      - citation metadata
      - item notes
    artifact_contracts:
      - source registry entry
    permissions:
      <<: *default_permissions
      filesystem_write_scope: read_user_library_only
    dependencies:
      python_packages: []
      system_packages: []
      external_services:
        - local_zotero_mcp_server
      credentials_required: []
    overlap_group: reference_management
    default_priority: 15
    fallback_tools:
      - zotero
    conflicts_with: []
    compatibility_notes:
      - Optional access layer; Zotero remains the citation spine.
    risk_notes: *default_risks
    human_review_required_when:
      - search output will be treated as exhaustive
    downstream_export_policy: *default_export

  openalex_adapter:
    tool_id: openalex_adapter
    display_name: "OpenAlex Adapter"
    category: F01_discovery_external_evidence
    sub_category: bibliographic_api
    role: fallback
    status: optional
    source_type: cloud_service
    source_repository: OpenAlex
    source_url: "https://docs.openalex.org/"
    license: service_terms
    version_pin: ""
    installation_mode: no_install_http_api
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - open scholarly metadata lookup
    activation_triggers:
      - DOI or title metadata needs open verification
    inputs:
      - DOI
      - title
      - author
    outputs:
      - work metadata
      - venue metadata
    artifact_contracts:
      - citation metadata note
    permissions:
      <<: *default_permissions
      network_access: required
    dependencies:
      python_packages:
        - requests
      system_packages: []
      external_services:
        - OpenAlex
      credentials_required: []
    overlap_group: academic_metadata
    default_priority: 50
    fallback_tools:
      - crossref_adapter
      - semantic_scholar_adapter
    conflicts_with: []
    compatibility_notes:
      - Use for metadata verification, not claim synthesis.
    risk_notes: *default_risks
    human_review_required_when:
      - metadata conflicts with publisher records
    downstream_export_policy: *default_export

  crossref_adapter:
    tool_id: crossref_adapter
    display_name: "Crossref Adapter"
    category: F01_discovery_external_evidence
    sub_category: doi_metadata_api
    role: fallback
    status: optional
    source_type: cloud_service
    source_repository: Crossref REST API
    source_url: "https://github.com/Crossref/rest-api-doc"
    license: service_terms
    version_pin: ""
    installation_mode: no_install_http_api
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - DOI metadata verification
    activation_triggers:
      - citation DOI metadata must be checked
    inputs:
      - DOI
      - title
    outputs:
      - citation metadata
    artifact_contracts:
      - citation metadata note
    permissions:
      <<: *default_permissions
      network_access: required
    dependencies:
      python_packages:
        - requests
      system_packages: []
      external_services:
        - Crossref
      credentials_required: []
    overlap_group: academic_metadata
    default_priority: 55
    fallback_tools:
      - openalex_adapter
    conflicts_with: []
    compatibility_notes:
      - Prefer publisher metadata when conflicts remain.
    risk_notes: *default_risks
    human_review_required_when:
      - metadata conflicts with cited PDF or publisher page
    downstream_export_policy: *default_export

  semantic_scholar_adapter:
    tool_id: semantic_scholar_adapter
    display_name: "Semantic Scholar Adapter"
    category: F01_discovery_external_evidence
    sub_category: scholarly_graph_api
    role: fallback
    status: optional
    source_type: cloud_service
    source_repository: Semantic Scholar API
    source_url: "https://api.semanticscholar.org/api-docs/"
    license: service_terms
    version_pin: ""
    installation_mode: no_install_http_api
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - citation graph lookup
      - abstract metadata discovery
    activation_triggers:
      - citation network or abstract metadata is needed
    inputs:
      - DOI
      - title
      - author
    outputs:
      - paper metadata
      - citation relationships
    artifact_contracts:
      - citation metadata note
    permissions:
      <<: *default_permissions
      network_access: required
    dependencies:
      python_packages:
        - requests
      system_packages: []
      external_services:
        - Semantic Scholar
      credentials_required: []
    overlap_group: academic_metadata
    default_priority: 60
    fallback_tools:
      - openalex_adapter
    conflicts_with: []
    compatibility_notes:
      - Use citation graph output as context, not as proof.
    risk_notes: *default_risks
    human_review_required_when:
      - citation graph is used for systematic review scope
    downstream_export_policy: *default_export

  literature_survey_skill:
    tool_id: literature_survey_skill
    display_name: "Literature Survey Skill"
    category: F02_literature_intelligence
    sub_category: synthesis
    role: primary
    status: optional
    source_type: external_skill
    source_repository: task_relevant_literature_skill
    source_url: "https://github.com/K-Dense-AI/scientific-agent-skills"
    license: upstream_specific
    version_pin: ""
    installation_mode: explicit_skill_install
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - literature synthesis
      - evidence table drafting
    activation_triggers:
      - task asks for literature synthesis or related-work structure
    inputs:
      - source list
      - research question
      - inclusion criteria
    outputs:
      - synthesis notes
      - evidence matrix draft
    artifact_contracts:
      - evidence matrix
      - source registry
    permissions: *default_permissions
    dependencies:
      python_packages: []
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: literature_synthesis
    default_priority: 10
    fallback_tools:
      - paperqa2
      - zotero_notes
    conflicts_with: []
    compatibility_notes:
      - Default synthesis tool; project-level judgment remains outside the tool.
    risk_notes: *default_risks
    human_review_required_when:
      - synthesis supports reportable claims
      - paper selection criteria are ambiguous
    downstream_export_policy: *default_export

  paperqa2:
    tool_id: paperqa2
    display_name: PaperQA2
    category: F02_literature_intelligence
    sub_category: evidence_tracing
    role: conditional
    status: optional
    source_type: library
    source_repository: Future-House/paper-qa
    source_url: "https://github.com/Future-House/paper-qa"
    license: BSD-3-Clause
    version_pin: ""
    installation_mode: explicit_optional_dependency
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - deep reading over paper corpus
      - page-level evidence tracing
      - contradiction analysis
    activation_triggers:
      - corpus size >= 20 PDFs
      - contradiction analysis
      - page-level evidence tracing
      - systematic review
      - precise method or equation comparison
    inputs:
      - PDF corpus
      - question
      - citation metadata
    outputs:
      - claim-to-source traces
      - quoted support snippets
      - contradiction notes
    artifact_contracts:
      - evidence matrix
      - claim graph
    permissions:
      <<: *default_permissions
      network_access: optional
      filesystem_write_scope: declared_corpus_cache_only
    dependencies:
      python_packages:
        - paper-qa
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: literature_synthesis
    default_priority: 30
    fallback_tools:
      - literature_survey_skill
    conflicts_with: []
    compatibility_notes:
      - Conditional only; it must not replace project-level judgment.
    risk_notes:
      hallucination_risk: medium
      provenance_risk: medium
      reproducibility_risk: high
      supply_chain_risk: medium
    human_review_required_when:
      - cited support is used in manuscript text
      - model answer contains inferential claims
    downstream_export_policy: *default_export

  zotero_notes:
    tool_id: zotero_notes
    display_name: "Zotero Notes"
    category: F02_literature_intelligence
    sub_category: note_storage
    role: secondary
    status: optional
    source_type: manual_tool
    source_repository: Zotero
    source_url: "https://www.zotero.org/support/notes"
    license: service_terms
    version_pin: ""
    installation_mode: user_desktop_install
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - source annotations
      - reading notes
    activation_triggers:
      - local reading notes are the evidence spine
    inputs:
      - citation items
      - annotations
    outputs:
      - note exports
    artifact_contracts:
      - source note
    permissions:
      <<: *default_permissions
      filesystem_write_scope: user_library_outside_repo
    dependencies:
      python_packages: []
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: note_storage
    default_priority: 25
    fallback_tools:
      - evidence_matrix_builder
    conflicts_with: []
    compatibility_notes:
      - Notes are evidence aids, not final claims.
    risk_notes:
      hallucination_risk: low
      provenance_risk: medium
      reproducibility_risk: medium
      supply_chain_risk: low
    human_review_required_when:
      - notes are paraphrased into reportable claims
    downstream_export_policy: *default_export

  evidence_matrix_builder:
    tool_id: evidence_matrix_builder
    display_name: "Evidence Matrix Builder"
    category: F02_literature_intelligence
    sub_category: structured_evidence
    role: primary
    status: installed
    source_type: local_python
    source_repository: Elwyn921/template-research
    source_url: local
    license: repository
    version_pin: "0.1.0"
    installation_mode: included
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - structured source-to-claim table creation
    activation_triggers:
      - claim evidence needs source traceability
    inputs:
      - source records
      - claims
    outputs:
      - evidence matrix
    artifact_contracts:
      - evidence_matrix.schema.yaml
    permissions:
      <<: *default_permissions
      network_access: none
      code_execution: true
    dependencies:
      python_packages:
        - pyyaml
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: evidence_structuring
    default_priority: 10
    fallback_tools: []
    conflicts_with: []
    compatibility_notes:
      - Writes structured evidence records only.
    risk_notes:
      hallucination_risk: low
      provenance_risk: medium
      reproducibility_risk: low
      supply_chain_risk: low
    human_review_required_when:
      - evidence matrix is used for manuscript claims
    downstream_export_policy: *default_export

  python:
    tool_id: python
    display_name: Python
    category: F03_data_engineering_structured_storage
    sub_category: automation_language
    role: primary
    status: installed
    source_type: local_python
    source_repository: python/cpython
    source_url: "https://github.com/python/cpython"
    license: PSF-2.0
    version_pin: ">=3.11"
    installation_mode: base_environment
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - transformation
      - analytics
      - validation
      - automation
    activation_triggers:
      - data processing or validation is required
    inputs:
      - files
      - configs
    outputs:
      - generated artifacts
      - logs
    artifact_contracts:
      - run manifest
    permissions:
      <<: *default_permissions
      network_access: none
      code_execution: true
    dependencies:
      python_packages: []
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: programming_language
    default_priority: 1
    fallback_tools: []
    conflicts_with: []
    compatibility_notes:
      - Default automation language for Foundry utilities.
    risk_notes:
      hallucination_risk: low
      provenance_risk: low
      reproducibility_risk: low
      supply_chain_risk: low
    human_review_required_when:
      - code changes affect reportable outputs
    downstream_export_policy: *default_export

  pandas:
    tool_id: pandas
    display_name: pandas
    category: F03_data_engineering_structured_storage
    sub_category: tabular_data
    role: primary
    status: installed
    source_type: library
    source_repository: pandas-dev/pandas
    source_url: "https://github.com/pandas-dev/pandas"
    license: BSD-3-Clause
    version_pin: ">=2.2"
    installation_mode: base_environment
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - tabular data inspection
      - CSV and Excel transformation
    activation_triggers:
      - data table needs local transformation or audit
    inputs:
      - CSV
      - Excel
      - Parquet
    outputs:
      - DataFrame
      - processed table
    artifact_contracts:
      - dataset inventory
      - result ledger
    permissions:
      <<: *default_permissions
      network_access: none
      code_execution: true
    dependencies:
      python_packages:
        - pandas
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: dataframe_engine
    default_priority: 10
    fallback_tools:
      - polars
      - duckdb
    conflicts_with: []
    compatibility_notes:
      - Default table engine until scale or query needs justify DuckDB or Polars.
    risk_notes:
      hallucination_risk: low
      provenance_risk: medium
      reproducibility_risk: low
      supply_chain_risk: low
    human_review_required_when:
      - transformations define reportable datasets
    downstream_export_policy: *default_export

  polars:
    tool_id: polars
    display_name: Polars
    category: F03_data_engineering_structured_storage
    sub_category: tabular_data
    role: conditional
    status: optional
    source_type: library
    source_repository: pola-rs/polars
    source_url: "https://github.com/pola-rs/polars"
    license: MIT
    version_pin: ""
    installation_mode: explicit_optional_dependency
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - faster local dataframe operations
    activation_triggers:
      - pandas becomes slow or memory-bound
      - lazy query planning is useful
    inputs:
      - tabular files
    outputs:
      - processed table
    artifact_contracts:
      - dataset inventory
    permissions:
      <<: *default_permissions
      network_access: none
      code_execution: true
    dependencies:
      python_packages:
        - polars
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: dataframe_engine
    default_priority: 35
    fallback_tools:
      - pandas
      - duckdb
    conflicts_with: []
    compatibility_notes:
      - Use when scale justifies another dataframe dependency.
    risk_notes: *default_risks
    human_review_required_when:
      - introducing Polars changes pipeline semantics
    downstream_export_policy: *default_export

  duckdb:
    tool_id: duckdb
    display_name: DuckDB
    category: F03_data_engineering_structured_storage
    sub_category: local_analytics_database
    role: primary
    status: optional
    source_type: library
    source_repository: duckdb/duckdb
    source_url: "https://github.com/duckdb/duckdb"
    license: MIT
    version_pin: ""
    installation_mode: explicit_optional_dependency
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - local analytical SQL
      - structured research data layer
    activation_triggers:
      - multiple tables need repeatable SQL joins
      - Parquet-backed structured storage is desired
    inputs:
      - CSV
      - Parquet
      - SQL
    outputs:
      - query results
      - Parquet tables
    artifact_contracts:
      - dataset inventory
      - data contract
    permissions:
      <<: *default_permissions
      network_access: none
      code_execution: true
    dependencies:
      python_packages:
        - duckdb
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: structured_storage
    default_priority: 15
    fallback_tools:
      - pandas
    conflicts_with: []
    compatibility_notes:
      - Canonical local structured research data layer with Parquet.
    risk_notes:
      hallucination_risk: low
      provenance_risk: medium
      reproducibility_risk: low
      supply_chain_risk: low
    human_review_required_when:
      - SQL transforms define reportable outputs
    downstream_export_policy: *default_export

  parquet:
    tool_id: parquet
    display_name: Parquet
    category: F03_data_engineering_structured_storage
    sub_category: columnar_storage
    role: primary
    status: optional
    source_type: library
    source_repository: apache/parquet-format
    source_url: "https://github.com/apache/parquet-format"
    license: Apache-2.0
    version_pin: ""
    installation_mode: explicit_optional_dependency
    default_scope: *local_scope
    allowed_project_types: *all_project_types
    primary_tasks:
      - reproducible columnar data storage
    activation_triggers:
      - processed tables are reused across steps
      - DuckDB or pandas writes processed datasets
    inputs:
      - processed table
    outputs:
      - Parquet file
    artifact_contracts:
      - dataset inventory
    permissions:
      <<: *default_permissions
      network_access: none
      code_execution: true
    dependencies:
      python_packages:
        - pyarrow
      system_packages: []
      external_services: []
      credentials_required: []
    overlap_group: data_storage_format
    default_priority: 15
    fallback_tools:
      - CSV
    conflicts_with: []
    compatibility_notes:
      - Raw data remains immutable; processed data is code-generated.
    risk_notes:
      hallucination_risk: low
      provenance_risk: low
      reproducibility_risk: low
      supply_chain_risk: low
    human_review_required_when:
