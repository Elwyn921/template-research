id: FIG-EXAMPLE-CONCRETE-PREDICTION-DIAGNOSTICS
title: "Concrete strength prediction diagnostics"
figure_type: data-figure
mode: plot
aspect_ratio: "16:9"
figure_role: data
paper_claim: "The concrete prediction model should be evaluated with split-aware accuracy, residual behavior, and explainable feature effects before being used for decision support."
figure_goal: "Create a multi-panel data figure for concrete/materials ML diagnostics using source data, committed model outputs, or registered experiment records only."
audience: "materials science, civil engineering, and applied AI readers"
caption: "Prediction diagnostics and explainable AI checks for a concrete materials model."
data_requirements:
  source_paths:
    - "examples/research_os_project/outputs/predictions/<run-id>_predictions.csv"
    - "examples/research_os_project/outputs/tables/<run-id>_metrics.csv"
    - "examples/research_os_project/outputs/tables/<run-id>_shap_values.csv"
  required_columns:
    - "split"
    - "y_true"
    - "y_pred"
    - "residual"
    - "target_unit"
  units:
    y_true: "MPa"
    y_pred: "MPa"
    residual: "MPa"
  split_columns:
    - "split"
  uncertainty_columns:
    - "y_pred_lower"
    - "y_pred_upper"
plot_spec:
  chart_family: "prediction-diagnostics"
  x: "y_true"
  y: "y_pred"
  color: "split"
  facet: null
  statistical_annotations:
    - "R2 by split"
    - "RMSE by split"
    - "MAE by split"
    - "sample size by split"
  uncertainty_method: "prediction interval when available; otherwise omit uncertainty band and note limitation"
  local_plot_panels:
    - "Observed-vs-predicted parity plot with 1:1 reference line"
    - "Residual-vs-fitted plot by validation split"
    - "Residual distribution with zero reference line"
    - "SHAP summary or top-feature bar plot generated from committed SHAP output"
panels:
  - name: "Prediction parity"
    purpose: "Show whether predictions align with measured concrete property values."
    content: "Observed y_true versus predicted y_pred, colored by split, with 1:1 reference line and split-aware metrics."
    evidence_or_data: "examples/research_os_project/outputs/predictions/<run-id>_predictions.csv and examples/research_os_project/outputs/tables/<run-id>_metrics.csv"
  - name: "Residual behavior"
    purpose: "Show bias, heteroscedasticity, and outlier behavior."
    content: "Residuals versus fitted values and residual distribution, with target unit shown."
    evidence_or_data: "examples/research_os_project/outputs/predictions/<run-id>_predictions.csv"
  - name: "XAI feature effects"
    purpose: "Show which mix-design or test-condition features drive the model."
    content: "SHAP summary, SHAP bar plot, or partial dependence plot tied to feature names in the data dictionary."
    evidence_or_data: "examples/research_os_project/outputs/tables/<run-id>_shap_values.csv or committed XAI output"
must_keep_labels:
  - "Observed"
  - "Predicted"
  - "Residual"
  - "Validation split"
  - "SHAP / XAI"
forbidden_content:
  - "invented accuracy values"
  - "invented uncertainty intervals"
  - "unsupported material mechanisms"
  - "axis labels without units"
  - "metrics computed across leaked train/test splits"
style_constraints:
  - "publication style"
  - "readable axis labels with units"
  - "consistent split colors across panels"
  - "show sample size when metrics are annotated"
  - "avoid decorative effects that hide outliers"
source_paths:
  - "FOUNDATIONS.md"
  - "foundation/contracts/research_integrity.md"
  - "foundation/contracts/figure_contract.md"
  - "tool_fabric/TOOL_FABRIC.md"
verification_checklist:
  - "All numeric marks come from source data, committed outputs, or registered experiment records."
  - "Axes include units or clearly state dimensionless metrics."
  - "Train, validation, and test splits are not mixed without disclosure."
  - "Metrics match the supporting table."
  - "Residual and uncertainty patterns are not overstated."
  - "XAI feature names match the data dictionary or source data columns."
output_record:
  figure_path: "examples/research_os_project/outputs/figures/<run-id>_prediction_diagnostics.png"
  supporting_tables:
    - "examples/research_os_project/outputs/tables/<run-id>_metrics.csv"
  generation_notes: "Replace placeholder paths with the active experiment outputs before generating."
