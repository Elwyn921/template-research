id: FIG-EXAMPLE-SAMPLE-DATA-FIGURE
title: "Sample data relationship figure"
figure_type: data-figure
mode: plot
aspect_ratio: "16:9"
figure_role: data
paper_claim: "A reportable data figure should be generated from local data with explicit axes, units, and source records."
figure_goal: "Demonstrate the local data-figure workflow on the template sample dataset."
audience: "research workflow maintainers"
caption: "Template sample data figure generated from a local CSV."
data_requirements:
  source_paths:
    - "data/sample/demo_input.csv"
  required_columns:
    - "entity_id"
    - "period"
    - "value"
  units:
    value: "demo units"
  split_columns:
    - "entity_id"
  uncertainty_columns: []
plot_spec:
  chart_family: "bar"
  x: "entity_id"
  y: "value"
  color: null
  facet: null
  statistical_annotations:
    - "sample size"
  uncertainty_method: null
  local_plot_panels:
    - "Bar chart of value by entity_id"
panels:
  - name: "Sample values"
    purpose: "Show that the data-figure builder reads local data and labels axes."
    content: "Bar chart of value by entity_id using data/sample/demo_input.csv."
    evidence_or_data: "data/sample/demo_input.csv"
must_keep_labels:
  - "entity_id"
  - "value"
forbidden_content:
  - "invented values"
  - "unsupported trend claim"
  - "unlabeled units"
style_constraints:
  - "readable axis labels"
  - "simple publication-safe styling"
  - "no decorative effects that imply extra evidence"
source_paths:
  - "RESEARCH.md"
  - "PROJECT_BRIEF.yaml"
  - "FIGURE_GENERATION_CONTRACT.md"
  - "docs/RESEARCH_STACK.md"
verification_checklist:
  - "All bars come from data/sample/demo_input.csv."
  - "The value axis includes units."
  - "The figure does not imply a trend beyond the sample data."
output_record:
  figure_path: "outputs/figures/example_sample_data_figure.png"
  supporting_tables: []
  generation_notes: "Minimal runnable data-figure example for the template."
