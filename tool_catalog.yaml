catalog_version: "0.2"
purpose: "GitHub-first, opt-in research tool index for Template Research."
local_policy:
  default_install: "uv sync --group dev"
  optional_install: "make setup EXTRAS=\"<extra-name>\""
  default_enabled_modules:
    - figure_generation
    - data_and_database
    - project_ops
  rule: "Keep this repository light. Read upstream GitHub docs before enabling tools. Do not vendor external repos, provider configs, API keys, restricted PDFs, or local service settings."
status_values:
  enabled: "Usable in the base template."
  candidate: "Available to enable after reading upstream docs and confirming project need."
  reserved: "Needs external account, app, API, service, or project-specific setup."

modules:
  figure_generation:
    title: "Figure generation"
    status: enabled
    maturity_level: M3
    use_when:
      - "A research output needs a data, conceptual, mixed, or graphical abstract figure."
      - "Exact plotted values, labels, units, or figure claims must be traceable."
    local_steps:
      - "Read FIGURE_GENERATION_CONTRACT.md."
      - "Create or update a figure brief under reports/paper/figures/briefs/."
      - "For exact data figures, use a data-grounded renderer: local builder, Engineering Figure Agent plot mode, declarative chart specs, Plotly or Observable-style output, Quarto-rendered figures, or another audited path."
      - "For conceptual figures, use Engineering Figure Agent image mode from the brief."
      - "Save outputs under outputs/figures/ and keep sidecar or report notes."
    primary_outputs:
      - "outputs/figures/"
      - "outputs/tables/"
      - "reports/paper/figures/briefs/"
    verification:
      - "Numeric marks come from source data, committed outputs, or registered experiment records."
      - "Axes, units, labels, split definitions, and forbidden content are checked."
      - "Do not use image generation for exact values, benchmark geometry, SHAP, residuals, or metrics."
    tools:
      - name: "Local matplotlib plotting"
        status: enabled
        local_package: "matplotlib"
      - name: "Engineering Figure Agent"
        status: candidate
        github_url: "https://github.com/heyu-233/engineering-figure-agent"
        entrypoint: "SKILL.md"
        read_first:
          - "README.zh-CN.md"
          - "SKILL.md"
          - "schemas/plot-request.schema.json"
      - name: "PaperVizAgent"
        status: candidate
        github_url: "https://github.com/google-research/papervizagent"
        read_first:
          - "README.md"
      - name: "Altair / Vega-Lite"
        status: candidate
        github_url: "https://github.com/vega/altair"
      - name: "Plotly.py"
        status: candidate
        github_url: "https://github.com/plotly/plotly.py"
      - name: "Observable Plot"
        status: candidate
        github_url: "https://github.com/observablehq/plot"

  file_ingestion:
    title: "File ingestion and document parsing"
    status: candidate
    maturity_level: M1
    use_when:
      - "Research inputs arrive as PDF, DOCX, PPTX, XLSX, HTML, images, or scanned reports."
      - "Source documents must become structured notes before analysis or citation."
    local_steps:
      - "Store immutable originals under data/raw/ or data/external/."
      - "Register reportable sources in metadata/source_registry.csv."
      - "Convert or summarize into reports/memos/ only after reading upstream tool docs."
      - "Mark OCR/table extraction uncertainty before using extracted values."
    primary_outputs:
      - "data/raw/"
      - "data/external/"
      - "reports/memos/"
      - "metadata/source_registry.csv"
    verification:
      - "Original source path, conversion tool, date, and extraction limits are recorded."
      - "Restricted PDFs, private documents, and local app databases are not committed."
    tools:
      - name: "MarkItDown"
        status: candidate
        github_url: "https://github.com/microsoft/markitdown"
        optional_extra: "file-ingestion"
      - name: "Pandoc"
        status: candidate
        github_url: "https://github.com/jgm/pandoc"
      - name: "OCR tool"
        status: reserved

  literature_and_citations:
    title: "Literature retrieval and citation evidence"
    status: candidate
    maturity_level: M1
    use_when:
      - "A task needs paper discovery, citation cleanup, DOI checks, or local library retrieval."
      - "A scientific claim needs literature evidence."
    local_steps:
      - "Use Zotero as the local citation spine when available."
      - "Use selected upstream tools only after reading their GitHub docs."
      - "Record reportable papers in metadata/source_registry.csv or report notes."
      - "Keep restricted PDFs and local Zotero databases out of Git."
    primary_outputs:
      - "metadata/source_registry.csv"
      - "reports/memos/"
      - "reports/paper/"
    verification:
      - "Capture title, year, DOI or URL, access date, and claim supported."
      - "Check DOI, author, year, and title before citing in reports."
    tools:
      - name: "Zotero"
        status: reserved
        github_url: "https://github.com/zotero/zotero"
      - name: "ZotSeek"
        status: reserved
        github_url: "https://github.com/introfini/ZotSeek"
      - name: "K-Dense Scientific Agent Skills"
        status: candidate
        github_url: "https://github.com/K-Dense-AI/scientific-agent-skills"
      - name: "Better BibTeX"
        status: candidate
        github_url: "https://github.com/retorquere/zotero-better-bibtex"
      - name: "OpenAlex"
        status: candidate
        docs_url: "https://docs.openalex.org/"
      - name: "Crossref REST API"
        status: candidate
        github_url: "https://github.com/Crossref/rest-api-doc"
      - name: "Semantic Scholar API"
        status: candidate
        docs_url: "https://api.semanticscholar.org/api-docs/"

  web_industry_research:
    title: "Web, company, policy, and open-source research"
    status: candidate
    maturity_level: M1
    use_when:
      - "AI industry, investment, policy, company, open-source, or market research requires current web evidence."
      - "Source dates, company scope, sector scope, and caveats matter."
    local_steps:
      - "Prefer primary sources: official docs, filings, policies, repos, releases."
      - "Read upstream MCP server docs before enabling any service."
      - "Record source date, access date, scope, and caveats in source registry or memo."
      - "Do not commit credentials or generated provider configs."
    primary_outputs:
      - "metadata/source_registry.csv"
      - "reports/memos/"
      - "outputs/tables/"
    verification:
      - "Separate primary sources, news, commentary, scraped pages, and model inference."
      - "Financial or investment claims include source limitations."
    tools:
      - name: "Exa MCP"
        status: reserved
        github_url: "https://github.com/exa-labs/exa-mcp-server"
      - name: "Tavily MCP"
        status: reserved
        github_url: "https://github.com/tavily-ai/tavily-mcp"
      - name: "Firecrawl MCP"
        status: reserved
        github_url: "https://github.com/firecrawl/firecrawl-mcp-server"
      - name: "GitHub MCP"
        status: reserved
        github_url: "https://github.com/github/github-mcp-server"

  data_and_database:
    title: "Data tables, local databases, and data quality"
    status: enabled
    maturity_level: M2
    use_when:
      - "CSV, Excel, Parquet, or local database files need repeatable audit, query, or transformation."
      - "Data are too large or structured for notebook-only work."
    local_steps:
      - "Put immutable data under data/raw/ or data/external/."
      - "Register dataset releases in metadata/data_manifest.csv."
      - "Keep transformation parameters in configs/."
      - "Run make audit before using data as evidence."
    primary_outputs:
      - "data/interim/"
      - "data/processed/"
      - "outputs/tables/"
      - "outputs/diagnostics/"
      - "metadata/data_manifest.csv"
    verification:
      - "Rows, columns, sensitivity status, quality status, missingness, units, and transformations are recorded."
      - "Derived tables are reproducible from scripts, configs, or documented queries."
    tools:
      - name: "pandas"
        status: enabled
        local_package: "pandas"
      - name: "DuckDB"
        status: candidate
        github_url: "https://github.com/duckdb/duckdb"
      - name: "Polars"
        status: candidate
        github_url: "https://github.com/pola-rs/polars"
      - name: "Pandera"
        status: candidate
        github_url: "https://github.com/unionai-oss/pandera"
      - name: "Great Expectations"
        status: candidate
        github_url: "https://github.com/great-expectations/great_expectations"

  modeling_and_experiments:
    title: "Modeling, diagnostics, explainability, and experiments"
    status: candidate
    maturity_level: M2
    use_when:
      - "A project needs prediction, statistical modeling, explainability, baseline comparison, or experiment records."
      - "Model outputs may become reportable evidence."
    local_steps:
      - "Define dataset version, split, seed, metric, and baseline before modeling."
      - "Put choices in configs/ and outputs in outputs/."
      - "Record reportable runs in experiments/experiment_registry.csv."
      - "Read upstream docs before adding modeling libraries not already installed."
    primary_outputs:
      - "outputs/models/"
      - "outputs/predictions/"
      - "outputs/tables/"
      - "outputs/diagnostics/"
      - "experiments/experiment_registry.csv"
    verification:
      - "Check leakage, split definitions, baselines, metric definitions, uncertainty, and feature names."
      - "Do not invent model metrics or causal conclusions."
    tools:
      - name: "scikit-learn"
        status: candidate
        github_url: "https://github.com/scikit-learn/scikit-learn"
        optional_extra: "data-experiment"
      - name: "statsmodels"
        status: candidate
        github_url: "https://github.com/statsmodels/statsmodels"
        optional_extra: "data-experiment"
      - name: "SHAP"
        status: candidate
        github_url: "https://github.com/shap/shap"
        optional_extra: "data-experiment"
      - name: "InterpretML"
        status: candidate
        github_url: "https://github.com/interpretml/interpret"
      - name: "Optuna"
        status: candidate
        github_url: "https://github.com/optuna/optuna"

  artifact_versioning:
    title: "Large artifact and experiment versioning"
    status: candidate
    maturity_level: M1
    use_when:
      - "Data, model artifacts, predictions, or intermediates outgrow Git."
      - "Collaborators need artifact checkout or pipeline-level reproducibility."
    local_steps:
      - "Use Git and human-readable manifests first."
      - "Read DVC upstream docs and extensions/dvc/README.md before enabling."
      - "Record storage and remote decisions in docs/DECISIONS.md."
      - "Keep manifests readable even when artifacts move to DVC."
    primary_outputs:
      - "dvc.yaml"
      - "dvc.lock"
      - "*.dvc"
    verification:
      - "DVC is enabled only for concrete large artifact needs."
      - "DVC metadata changes are tied to dataset, model, or experiment records."
    tools:
      - name: "DVC"
        status: candidate
        github_url: "https://github.com/iterative/dvc"
        optional_extra: "data-versioning"
      - name: "DVCLive"
        status: candidate
        github_url: "https://github.com/iterative/dvclive"

  writing_and_publication:
    title: "Writing, reports, presentations, and publication output"
    status: candidate
    maturity_level: M1
    use_when:
      - "A memo, paper, slide deck, appendix, or website must consume committed sources and outputs."
      - "A report needs one-command regeneration or citation-safe publication packaging."
    local_steps:
      - "Use Markdown first."
      - "Add Quarto only when one-command regeneration is required."
      - "Reports consume outputs/ rather than hiding analysis logic inline."
      - "Read upstream docs before enabling publication tooling."
    primary_outputs:
      - "reports/"
      - "outputs/figures/"
      - "outputs/tables/"
    verification:
      - "Report claims link to source IDs, dataset IDs, experiment IDs, tables, figures, or citations."
      - "Citation keys, figure paths, and table paths are checked before sharing."
    tools:
      - name: "Quarto"
        status: candidate
        github_url: "https://github.com/quarto-dev/quarto-cli"
        optional_extra: "publication-output"
      - name: "Pandoc"
        status: candidate
        github_url: "https://github.com/jgm/pandoc"
      - name: "python-pptx"
        status: candidate
        github_url: "https://github.com/scanny/python-pptx"
      - name: "PptxGenJS"
        status: candidate
        github_url: "https://github.com/gitbrent/PptxGenJS"

  project_ops:
    title: "Code quality, project operations, and maintenance"
    status: enabled
    maturity_level: M3
    use_when:
      - "Reusable research code, CI, linting, tests, or dependency hygiene are touched."
    local_steps:
      - "Run make lint, make test, make audit, and make tools-audit after related changes."
      - "Document heavy workflow changes in docs/DECISIONS.md."
      - "Keep generated files and private data out of Git."
    primary_outputs:
      - "tests/"
      - ".github/workflows/"
      - "docs/DECISIONS.md"
    verification:
      - "Ruff, pytest, registry audit, and tool audit pass."
    tools:
      - name: "Ruff"
        status: enabled
        github_url: "https://github.com/astral-sh/ruff"
      - name: "pytest"
        status: enabled
        github_url: "https://github.com/pytest-dev/pytest"
      - name: "pre-commit"
        status: candidate
        github_url: "https://github.com/pre-commit/pre-commit"
      - name: "GitHub Actions runner"
        status: enabled
        github_url: "https://github.com/actions/runner"

profiles:
  base_research:
    title: "Base reproducible research project"
    default_modules:
      - figure_generation
      - data_and_database
      - project_ops
    optional_modules:
      - file_ingestion
      - literature_and_citations
      - modeling_and_experiments
      - writing_and_publication
    first_commands:
      - "make setup"
      - "make test"
      - "make audit"
  concrete_ml:
    title: "Concrete and materials ML project"
    default_modules:
      - file_ingestion
      - literature_and_citations
      - data_and_database
      - modeling_and_experiments
      - figure_generation
      - project_ops
    optional_modules:
      - artifact_versioning
      - writing_and_publication
    first_commands:
      - "make audit"
      - "make demo"
      - "make data-figure"
  ai_industry_research:
    title: "AI industry and investment research"
    default_modules:
      - file_ingestion
      - web_industry_research
      - data_and_database
      - figure_generation
      - writing_and_publication
      - project_ops
    optional_modules:
      - literature_and_citations
      - modeling_and_experiments
      - artifact_versioning
    first_commands:
      - "make audit"
  industrial_factor_mining:
    title: "Industrial factor mining and statistical modeling"
    default_modules:
      - data_and_database
      - modeling_and_experiments
      - figure_generation
      - project_ops
    optional_modules:
      - file_ingestion
      - web_industry_research
      - artifact_versioning
      - writing_and_publication
    first_commands:
      - "make audit"
  paper_publication:
    title: "Paper, report, and presentation production"
    default_modules:
      - literature_and_citations
      - figure_generation
      - writing_and_publication
      - project_ops
    optional_modules:
      - file_ingestion
      - data_and_database
      - artifact_versioning
    first_commands:
      - "make audit"
      - "make paperviz-input"
